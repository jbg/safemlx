[package]
name = "safemlx-lm"
version = "0.1.2"
edition.workspace = true
authors.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Rust MLX language model runtime"
readme = "README.md"

[package.metadata.docs.rs]
targets = ["aarch64-apple-darwin"]

[dependencies]
# Local dependencies
safemlx = { workspace = true, features = ["safetensors"] }
safemlx-lm-utils.workspace = true

# External dependencies
serde = { version = "1", features = ["derive"] }
anyhow = "1"
tokenizers = "0.22.0"
clap = { version = "4", features = ["derive"] }
idna_adapter = "1.2" 
thiserror = "2"
serde_json = "1"
minijinja = "2"

[dev-dependencies]
lazy_static = "1"
